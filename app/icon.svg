<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!--
    Favicon = the Mallín mark set inside a rounded brand tile, so it has the
    same presence as the link-preview card (opengraph-image.tsx) instead of
    reading as a bare squiggle on the tab bar. Theme-aware: a light "paper"
    tile on dark tab bars, a dark "ink" tile on light tab bars — legible on
    both. Browsers that ignore the media query fall back to the paper tile.
  -->
  <style>
    .tile   { fill: #f4f1ea; }
    .steppe { stroke: #1a2230; }
    .stream { stroke: #4a7186; }
    @media (prefers-color-scheme: light) {
      .tile   { fill: #1a2230; }
      .steppe { stroke: #f4f1ea; }
      .stream { stroke: #93b2c4; }
    }
  </style>

  <rect class="tile" width="64" height="64" rx="14" />

  <!-- Surface line: rolling Patagonian steppe -->
  <path class="steppe" d="M 6 30 Q 18 25, 32 30 T 58 30" stroke-width="3" stroke-linecap="round" />

  <!-- Three vegetation tufts breaking the surface (the lush mallín cover) -->
  <line class="steppe" x1="22" y1="26" x2="22" y2="21" stroke-width="1.75" stroke-linecap="round" />
  <line class="steppe" x1="32" y1="26" x2="32" y2="18" stroke-width="1.75" stroke-linecap="round" />
  <line class="steppe" x1="42" y1="26" x2="42" y2="21" stroke-width="1.75" stroke-linecap="round" />

  <!-- Hidden underground current: the stream that sustains the wetland -->
  <path class="stream" d="M 3 46 Q 17 40, 32 46 T 61 46" stroke-width="3" stroke-linecap="round" />
</svg>
